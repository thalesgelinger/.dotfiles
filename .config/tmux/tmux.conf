# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin "janoamaral/tokyo-night-tmux"

set -g default-shell /opt/homebrew/bin/fish
set -g default-terminal "screen-256color"
set -g mouse on

unbind r
bind r source-file ~/.config/tmux/tmux.conf
# set -g status-style "bg=cyan, fg=#444444"
# set -g window-status-style "bg=cyan, fg=#444444"

setw -g mode-keys vi

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set -g base-index 1

bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-selection
bind-key -T copy-mode-vi 'Escape' send-keys -X cancel
bind-key -T copy-mode-vi 'r' send-keys -X rectangle-toggle

bind-key g display-popup -E -w 90% -h 90% -xC -yC -d "#{pane_current_path}" lazygit

unbind-key j
unbind-key k
unbind-key h
unbind-key l
bind-key j select-pane -D
bind-key k select-pane -U
bind-key h select-pane -L
bind-key l select-pane -R

bind-key -r s run-shell "~/.config/tmux/scripts/tmux-switch"
bind-key -r f run-shell "~/.config/tmux/scripts/tmux-sessionizer-popup"
bind-key -r m run-shell "~/.config/tmux/scripts/config-menu"
bind-key o new-window /opt/homebrew/bin/opencode
bind-key d display-popup -E -w 90% -h 90% -xC -yC -d "#{pane_current_path}" lazydocker
bind-key z resize-pane -Z


set -g status-position bottom
set-option -g status-style bg=default
set-option -g status-right '#[fg=cyan]#S'
set -g status-fg cyan
set -g window-status-current-style bg=cyan,fg=black
set -g window-status-format ' #I #W '
set -g window-status-current-format ' #I #W '
set -g status-left ""

# run '~/.config/tmux/plugins/tpm/tpm'
